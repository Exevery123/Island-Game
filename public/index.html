<!DOCTYPE html>
<html>
  <head>
    <title>Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  </head>
  <body>

  <div id="starting-screen" class="view">
    <h1>test</h1>
    <button id="start-btn" class="start-btn"> Start </button>
  </div>

  <div id="username-screen" class="view">
    <h1>What should we call you?</h1>
    <input type="text" class="username-input" id="username" placeholder="Enter...." />
  </div>

  <div id="tilemap-screen" class="view">
    <canvas id="tilemap-canvas"></canvas>
    <div id="known-players-hud">
      <span id="hud-title">Known Players</span>
      <span id="hud-username"></span>
    </div>
  </div>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background: #111;
}

h1 {
  font-family: 'Press Start 2P', cursive;
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  color: #fff;
}

.start-btn {
  font-family: 'Press Start 2P', sans-serif;
  font-weight: 700;
  font-size: 3rem;
  padding: 0.65em 2em;
  background: #ff9900;
  color: #000000;
  border: none;
  cursor: pointer;
}

.view {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#starting-screen {
  display: flex;
}

input[type="text"] {
  font-family: 'Press Start 2P', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  width: 300px;
  padding: 0.6em 1em;
  background: rgba(255,255,255,0.5);
  color: #333;
  border: none;
  outline: none;
  text-align: center;
  transition: box-shadow 0.2s, border-color 0.2s;
  margin-bottom: 14px;
}

#tilemap-screen {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#tilemap-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#known-players-hud {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  padding: 12px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

#hud-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 0.7rem;
  color: #fff;
}

#hud-username {
  font-family: 'Press Start 2P', cursive;
  font-size: 0.55rem;
  color: #ccc;
}
</style>


<script>
  const startBtn = document.getElementById('start-btn');
  const startingScreen = document.getElementById('starting-screen');
  const usernameScreen = document.getElementById('username-screen');
  const tilemapScreen = document.getElementById('tilemap-screen');
  const hudUsername = document.getElementById('hud-username');
  const usernameInput = document.getElementById('username');

  function showTilemap(username) {
    hudUsername.textContent = username;
    startingScreen.style.display = 'none';
    usernameScreen.style.display = 'none';
    tilemapScreen.style.display = 'flex';
  }

  async function saveUsername(username) {
    const res = await fetch('/api/player', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });
    return res.json();
  }

  // On load, check if a username is already saved
  fetch('/api/player')
    .then(r => r.json())
    .then(player => {
      if (player.username) {
        startingScreen.style.display = 'none';
        showTilemap(player.username);
      }
    });

  startBtn.addEventListener('click', () => {
    startingScreen.style.display = 'none';
    usernameScreen.style.display = 'flex';
    usernameInput.focus();
  });

  usernameInput.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && usernameInput.value.trim()) {
      const username = usernameInput.value.trim();
      await saveUsername(username);
      showTilemap(username);
    }
  });
</script>
# end
  </body>
</html>
